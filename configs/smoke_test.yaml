run_name: smoke
seed: 42

model:
  pretrained_name: LiheYoung/depth-anything-small-hf
  image_size: 64
  image_mean: [0.485, 0.456, 0.406]
  image_std: [0.229, 0.224, 0.225]

data:
  root: /tmp/depth_smoke
  train_split: splits/train.txt
  val_split: splits/val.txt
  test_split: splits/test.txt
  min_depth: 0.001
  max_depth: 10.0

train:
  epochs: 1
  batch_size: 1
  num_workers: 0
  learning_rate: 1.0e-5
  weight_decay: 1.0e-4
  grad_clip_norm: 1.0
  log_every: 1
  val_every_epoch: false
  save_path: /tmp/depth_smoke/checkpoints/smoke_best.pt
  history_path: /tmp/depth_smoke/outputs/metrics/smoke_history.jsonl

eval:
  checkpoint: /tmp/depth_smoke/checkpoints/smoke_best.pt
  summary_path: /tmp/depth_smoke/outputs/metrics/smoke_test_summary.json
  per_image_path: /tmp/depth_smoke/outputs/metrics/smoke_test_per_image.csv
  preview_dir: /tmp/depth_smoke/outputs/predictions/smoke_test
  num_preview_samples: 0

distillation:
  enabled: true
  model_id: LiheYoung/depth-anything-small-hf
  alpha: 0.5

loss:
  grad_weight: 0.1
